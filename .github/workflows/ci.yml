name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Run tests (safety red-line is the release gate)
        run: swift test

      # 安全红线与清理闭环必须全绿，否则不可合入
      - name: Verify safety regression suites ran
        run: |
          swift test 2>&1 | tee test.log
          grep -q "SafetyEngineTests" test.log
          grep -q "SafetyRulesTests" test.log
          grep -q "CleaningRoundTripTests" test.log
