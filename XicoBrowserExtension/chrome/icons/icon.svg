<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6D4AFF"/>
      <stop offset="1" stop-color="#9B6BFF"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4A2ECf" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- 圆角紫色方块 -->
  <rect x="8" y="8" width="112" height="112" rx="28" ry="28" fill="url(#g)" filter="url(#s)"/>

  <!-- 向下箭头（下载） -->
