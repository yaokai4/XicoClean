<!--
  Xico 下载助手 — popup
  注意：MV3 的 popup 不允许内联脚本，逻辑全部放在 popup.js。
-->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="popup.css" />

<div class="app">
  <header class="hd">
    <div class="brand">
      <div class="logo" aria-hidden="true">
        <!-- 与 icons/icon.svg 同款的向下箭头，内联以免闪烁 -->
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path d="M12 3.5v10.5m0 0 4-4m-4 4-4-4" fill="none" stroke="currentColor"
                stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M5.5 18.5h13" fill="none" stroke="currentColor"
                stroke-width="2.2" stroke-linecap="round" />
        </svg>
      </div>
      <div class="titles">
        <div class="t1">Xico 下载助手</div>
        <div class="t2" id="pageTitle">正在读取当前标签…</div>
      </div>
    </div>
  </header>

  <!-- 类型选择 -->
  <div class="kinds" role="tablist" aria-label="下载类型">
    <button class="kind active" data-kind="video" role="tab" aria-selected="true">视频</button>
    <button class="kind" data-kind="audio" role="tab" aria-selected="false">音频</button>
    <button class="kind" data-kind="image" role="tab" aria-selected="false">图片</button>
  </div>

  <!-- 主按钮 -->
  <button id="primary" class="primary">
    <span class="pri-main">在 Xico 中下载</span>
    <span class="pri-sub" id="primarySub">使用最佳来源</span>
  </button>

  <!-- 已检测到的媒体列表 -->
  <div class="section-title">
    <span>检测到的媒体</span>
    <span class="count" id="count">0</span>
  </div>

  <div id="list" class="list">
    <div class="empty" id="empty">
      未在此页面捕获到独立媒体地址。<br />
      你仍可用上方按钮把<strong>此页面地址</strong>交给 Xico，由其内置解析器尝试抓取。
    </div>
  </div>

  <footer class="ft">
    <span id="hint">数据只在本机流转，不上传任何服务器。</span>
  </footer>
</div>

<!-- toast -->
<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="popup.js"></script>
